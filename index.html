<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Processando resultado...</title>
</head>
<body>

<p>Processando resultado...</p>

<script>
  const params = new URLSearchParams(window.location.search);
  const raw = params.get("score");

  let score = 0;

  if (raw) {
    score = parseInt(raw.replace("%",""));
  }

  if (score === 100) {
    window.location.href = "grupo100.html?score=" + score;
  } else if (score >= 80) {
    window.location.href = "grupo80a99.html?score=" + score;
  } else {
    window.location.href = "grupoabaixo80.html?score=" + score;
  }
</script>

</body>
</html>
